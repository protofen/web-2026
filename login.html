<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <link rel="stylesheet" href="src/css/login.css">
</head>
<body>
    <div class="login-container">
        <img class="login-img" src="src/images/login.png" alt="Login">
        <h1>Войти</h1>
        <div class="form-container">
            <div class="input-group">
                <label class="input-label" for="email-input">Электропочта</label>
                <input class="text-input" id="email-input" type="email">
                <div class="input-hint">Введите электропочту</div>
            </div>
            <div class="input-group">
                <label class="input-label" for="password-input">Пароль</label>
                <input class="text-input" id="password-input" type="password">
            </div>
            <button class="submit-btn">Продолжить</button>
        </div>
    </div>
</body>
</html>
